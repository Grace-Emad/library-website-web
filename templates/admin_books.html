{% extends 'index.html' %}

{% block content %}
<main class="container">
    <h2>Manage Books</h2>

    <div style="margin-bottom: 20px;">
        <a href="{% url 'add_book' %}" class="btn">Add New Book</a>
        <a href="{% url 'add_admin' %}" class="btn">Add Admin</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Book Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
                <tr>
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td>{{ book.category }}</td>
                    <td>{{ book.status }}</td>
                    <td>
                        <a href="{% url 'edit_book' book.id %}" class="btn">Edit</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="5">No books have been added yet.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</main>
{% endblock %}
