{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Book Details</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'images/icon.png' %}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="iconName">
            <img src="{% static 'images/icon.png' %}" alt="icon" width="30px">
            <b><a href="{% url 'home' %}" style="text-decoration:none;">Online Library</a></b>
        </div>

        <div id="beforeAuth" class="logContainer">
            <a href="{% url 'login' %}" class="navbarBtns">Login</a>
            <a href="{% url 'signup' %}" class="navbarBtns">Sign Up</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="container">

        <div id="book-details-container">
            <p>Loading book details...</p>
        </div>

        <div id="borrow-section" style="margin-top: 20px;"></div>

    </main>

    <!-- JS -->
    <script src="{% static 'js/user.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get("id");

        if (!bookId) {
            document.getElementById("book-details-container").innerHTML =
                "<p>No book selected</p>";
        } else {

            fetch(`/api/book/${bookId}/`)
                .then(res => res.json())
                .then(data => {

                    document.getElementById("book-details-container").innerHTML = `
                        <h1>${data.title}</h1>
                        <p><b>Author:</b> ${data.author}</p>
                        <p>${data.description}</p>
                        <p>
                            <b>Status:</b>
                            ${data.available ? "Available" : "Not Available"}
                        </p>
                    `;

                    if (data.available) {
                        document.getElementById("borrow-section").innerHTML = `
                            <button onclick="borrowBook(${bookId})">
                                Borrow Book
                            </button>
                        `;
                    }
                });
        }

       
        function borrowBook(id) {
            fetch(`/api/borrow/${id}/`, {
                method: "POST"
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                location.reload();
            });
        }
    </script>

</body>
</html>
