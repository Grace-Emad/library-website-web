<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/queries.css">
    <link rel="icon" type="image/x-icon" href="../images/icon.png">
    <meta charset="UTF-8">
    <title>Edit Book</title>
</head>

<body>
    <nav class="navbar">
        <div class="iconName">
            <img src="../images/icon.png" alt="icon" width="30px">
            <b><a href="../index.html" style="color: inherit; text-decoration: none;">Online Library</a></b>
        </div>
        <ul class="pageOptions" id="navLinks"></ul>
        <div id="beforeAuth" class="logContainer hidden">
            <a href="login.html" class="navbarBtns">Login</a>
            <a href="signup.html" class="navbarBtns">Sign Up</a>
        </div>
        <div id="afterAuth" class="logContainer hidden">
            <span id="userGreeting" style="margin-right: 15px;"></span>
            <button id="logOutBtn" class="navbarBtns">Log Out</button>
        </div>
    </nav>

    <main class="container">
        <section class="form-container">
            <h2>Edit Book</h2>
            <form id="editBookForm">
                <label for="bookID">Book ID (Read-only)</label><br>
                <input type="text" id="bookID" name="bookID" class="formInput" readonly><br><br>

                <label for="title">Book Name</label><br>
                <input type="text" id="title" name="bookName" class="formInput" required><br><br>

                <label for="author">Author</label><br>
                <input type="text" id="author" name="author" class="formInput" required><br><br>

                <label>Category</label><br>
                <select id="category" name="category" class="formInput" required>
                    <option value="">Choose Category</option>
                    <option>Fiction</option>
                    <option>Science</option>
                    <option>History</option>
                    <option>Technology</option>
                </select><br><br>

                <label>Description</label><br>
                <textarea name="description" class="formInput" required></textarea><br><br>

                <button type="submit" class="btn">Update Book</button>
            </form>
        </section>
    </main>

    <script src="../js/admin.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
